<section class="presupuesto-section" id="presupuesto">
  <div class="container">
    
    <div class="section-header" data-aos="fade-up">
      <h2 class="section-title">SOLICITAR <span class="highlight">COTIZACIÓN</span></h2>
      <p class="section-subtitle">Completa los datos y te responderemos al instante por WhatsApp.</p>
    </div>

    <div class="form-container" data-aos="fade-up" data-aos-delay="200">
      <form class="cotizacion-form" (ngSubmit)="enviarWhatsApp()" ngNativeValidate>
        
        <div class="form-row">
          <div class="form-group">
            <label for="nombre">Nombre Completo</label>
            <input type="text" id="nombre" name="nombre" [(ngModel)]="datos.nombre" placeholder="Ej. Juan Pérez" required>
          </div>
          <div class="form-group">
            <label for="telefono">Teléfono / WhatsApp</label>
            <input type="tel" id="telefono" name="telefono" [(ngModel)]="datos.telefono" placeholder="Ej. +54 9..." required>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="vehiculo">Marca y Modelo del Vehículo</label>
            <input type="text" id="vehiculo" name="vehiculo" [(ngModel)]="datos.vehiculo" placeholder="Ej. Volkswagen Scirocco 2.0T" required>
          </div>
          <div class="form-group">
            <label for="servicio">Tipo de Servicio</label>
            <select id="servicio" name="servicio" [(ngModel)]="datos.servicio" required>
              <option value="" disabled selected>Seleccionar servicio...</option>
              <option value="Reparación de Granizo">Reparación de Granizo</option>
              <option value="Microbollos / Golpes de Estacionamiento">Microbollos / Golpes de Estacionamiento</option>
              <option value="Estética Vehicular / Tratamientos">Estética Vehicular / Tratamientos</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="detalles">Detalles del Daño</label>
          <textarea id="detalles" name="detalles" [(ngModel)]="datos.detalles" rows="4" placeholder="Describe brevemente la ubicación y tamaño de la abolladura..." required></textarea>
        </div>

        <div class="form-group file-upload" style="text-align: center; border: none; background: transparent;">
          <p style="color: var(--text-muted); font-size: 0.9rem;">
            <i class="fa-solid fa-camera" style="color: var(--accent-red);"></i> 
            Una vez que se abra WhatsApp, recuerda enviarnos un par de fotos del bollo.
          </p>
        </div>

        <div class="form-submit">
          <button type="submit" class="btn-submit">
            <i class="fa-brands fa-whatsapp" style="font-size: 1.2rem; margin-right: 5px;"></i> 
            ENVIAR POR WHATSAPP
          </button>
        </div>

      </form>
    </div>

  </div>
</section>
